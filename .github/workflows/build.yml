name: Build Anthology Pages

on:
  push:
    paths:
      - "data/anthology/*.json"
      - "images/anthology/**"
      - "templates/**"
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm install

      - name: Generate individual anthology pages
        run: |
          node scripts/generate_page.js

      - name: Generate index (special feature page)
        run: |
          node scripts/generate_index.js

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Auto-generate anthology pages" || echo "No changes to commit"
          git push
